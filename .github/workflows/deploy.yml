name: Deploy to Vercel

# ─── Triggers ──────────────────────────────────────────────────────────────
# • Push to main  → production deployment
# • Pull request  → preview deployment + URL comment on the PR
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Shared env ────────────────────────────────────────────────────────────
env:
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NODE_VERSION:      '20'

# ────────────────────────────────────────────────────────────────────────────
# Job 1 — Production (push to main only)
# ────────────────────────────────────────────────────────────────────────────
jobs:
  deploy-production:
    name: Deploy → Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull environment variables and project settings from Vercel
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Let Vercel run the Next.js build inside their optimised pipeline
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Upload the pre-built output; Vercel skips a second build
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

# ────────────────────────────────────────────────────────────────────────────
# Job 2 — Preview (pull-request only)
# ────────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy → Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      # Post the preview URL as a PR comment
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.url }}';
            const sha       = context.payload.pull_request.head.sha.slice(0, 7);
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ✅ Vercel Preview Deployment',
                '',
                `| Property | Value |`,
                `|---|---|`,
                `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
                `| **Commit** | \`${sha}\` |`,
                `| **Branch** | \`${{ github.head_ref }}\` |`,
                '',
                '_This preview will be promoted to production when the PR merges into **main**._',
              ].join('\n'),
            });
